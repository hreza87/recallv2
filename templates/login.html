{% extends "base.html" %}
{% block content %}

<h1>Log in</h1>

<form method="POST" action="{{ url_for('login') }}" class="card form">
    <label for="username">Username</label>
    <input type="text" id="username" name="username">

    <label for="password">Password</label>
    <input type="password" id="password" name="password">

    <button type="submit">Log in</button>
</form>

<p class="hint">
    No account yet? <a href="{{ url_for('register') }}">Register here</a>.
</p>
<p class="hint">
    Demo logins: teacher / teacher123 &nbsp;·&nbsp; student / student123
</p>

{% endblock %}
